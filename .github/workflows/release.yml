name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/open-godot-mcp-server.exe dist/open-godot-mcp-server-${{ matrix.target }}.exe
          else
            cp target/${{ matrix.target }}/release/open-godot-mcp-server dist/open-godot-mcp-server-${{ matrix.target }}
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-godot-mcp-server-${{ matrix.target }}
          path: dist/*

  package-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package Godot plugin
        shell: bash
        run: |
          mkdir -p dist
          cd godot_plugin/addons
          zip -r ../../dist/open-godot-mcp-plugin.zip open_godot_mcp

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-godot-mcp-plugin
          path: dist/open-godot-mcp-plugin.zip
