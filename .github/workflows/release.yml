name: Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package binary
        shell: bash
        run: |
          mkdir -p dist
          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/open-godot-mcp-server.exe dist/open-godot-mcp-server-${{ matrix.target }}.exe
          else
            cp target/${{ matrix.target }}/release/open-godot-mcp-server dist/open-godot-mcp-server-${{ matrix.target }}
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-godot-mcp-server-${{ matrix.target }}
          path: dist/*

  package-plugin:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Package Godot plugin
        shell: bash
        run: |
          mkdir -p dist
          cd godot_plugin/addons
          zip -r ../../dist/open-godot-mcp-plugin.zip open_godot_mcp

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: open-godot-mcp-plugin
          path: dist/open-godot-mcp-plugin.zip

  check-version:
    # Fail fast if the pushed tag does not match the versions declared in the
    # repo (Cargo.toml workspace + both plugin.cfg copies).
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify tag matches declared versions
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          CARGO_VERSION=$(grep -m1 '^version' Cargo.toml | cut -d'"' -f2)
          PLUGIN_VERSION=$(grep -m1 '^version' godot_plugin/addons/open_godot_mcp/plugin.cfg | cut -d'"' -f2)
          TEST_PLUGIN_VERSION=$(grep -m1 '^version' test_project/addons/open_godot_mcp/plugin.cfg | cut -d'"' -f2)
          echo "tag=$TAG cargo=$CARGO_VERSION plugin=$PLUGIN_VERSION test_plugin=$TEST_PLUGIN_VERSION"
          if [[ -z "$CARGO_VERSION" || "$TAG" != "$CARGO_VERSION" || "$TAG" != "$PLUGIN_VERSION" || "$TAG" != "$TEST_PLUGIN_VERSION" ]]; then
            echo "::error::Tag v$TAG does not match Cargo.toml ($CARGO_VERSION) and/or plugin.cfg versions ($PLUGIN_VERSION, $TEST_PLUGIN_VERSION)"
            exit 1
          fi

  publish-release:
    needs: [build, package-plugin, check-version]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p dist
          find artifacts/ -type f -exec cp {} dist/ \;
          ls -lh dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
